let FF={contexto:'',peor:'',mejor:'',realista:'',probPeor:30,probMejor:30,probRealista:40,fechaRevision:'',fromRecordId:null};
function resetFF(){FF={contexto:'',peor:'',mejor:'',realista:'',probPeor:30,probMejor:30,probRealista:40,fechaRevision:'',fromRecordId:null};}

function renderFuturoList(){
  const items=(S.futuras||[]).slice().sort((a,b)=>a.fechaRevision&&b.fechaRevision?new Date(a.fechaRevision)-new Date(b.fechaRevision):b.id-a.id);
  const pending=items.filter(f=>f.fechaRevision&&new Date(f.fechaRevision)<=new Date()&&!f.realidad);
  const hdr=`<div style="display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:1.2rem;padding-bottom:1.2rem;border-bottom:1px solid var(--bdr);flex-wrap:wrap;gap:10px">
    <div><div style="font-family:'Lora',serif;font-size:1.4rem;font-weight:400">Mirando al futuro</div><div style="font-size:12px;color:var(--txt3);margin-top:3px">${items.length} visión${items.length!==1?'es':''} · ${pending.length} pendiente${pending.length!==1?'s':''} de revisar</div></div>
    <div style="display:flex;gap:7px;flex-wrap:wrap;align-items:center">
      <button class="btn btn-ghost btn-sm" id="btn-fut-analisis">Ver análisis</button>
      <button class="btn btn-ghost btn-sm" id="btn-fut-back-home">← Inicio</button>
      <button class="btn btn-primary btn-sm" id="btn-fut-new">+ Nueva visión</button>
    </div>
  </div>`;
  if(!items.length)return hdr+`<div class="empty"><div class="empty-icon">🔭</div><div style="font-family:'Lora',serif;font-size:1.1rem;font-weight:400;color:var(--txt2);margin-bottom:.4rem">Sin visiones de futuro</div><div style="font-size:13px;color:var(--txt3);margin-bottom:1.8rem">Entrena tu mente para imaginar el mejor escenario posible.</div><button class="btn btn-primary" id="btn-fut-new">Crear primera visión</button></div>`;
  if(pending.length)hdr_extra=`<div style="background:var(--yelL);border:1px solid #E0C850;border-radius:var(--rs);padding:.8rem 1rem;margin-bottom:1rem;font-size:13px;display:flex;align-items:center;gap:8px">⏰ <strong>${pending.length}</strong> visión${pending.length!==1?'es':''} lista${pending.length!==1?'s':''} para revisar — ¿qué ocurrió realmente?</div>`;
  else hdr_extra='';
  const cards=items.map(f=>{
    const isPending=f.fechaRevision&&new Date(f.fechaRevision)<=new Date()&&!f.realidad;
    const isReviewed=!!f.realidad;
    const outcome=isReviewed?(f.outcomeType==='mejor'?'✓ Mejor':'o'===f.outcomeType?'— Realista':'✗ Peor'):'';
    const outcomeColor=isReviewed?(f.outcomeType==='mejor'?'var(--grn)':f.outcomeType==='peor'?'var(--dng)':'var(--wrm)'):'';
    return`<div class="grat-card ${isPending?'fav':''}" data-fut="${f.id}" style="${isPending?'border-left-color:#E0C850':''}">
      <div class="grat-date">${f.fechaRevision||'Sin fecha'}</div>
      <div class="grat-body">
        <div class="grat-text">${f.contexto||f.mejor||'Sin título'}</div>
        <div class="grat-meta">
          ${isPending?`<span style="font-size:11px;background:var(--yelL);color:var(--yel);padding:2px 8px;border-radius:20px;font-weight:500">⏰ Por revisar</span>`:''}
          ${isReviewed?`<span style="font-size:11px;padding:2px 8px;border-radius:20px;background:${outcomeColor}22;color:${outcomeColor};font-weight:500">${outcome}</span>`:''}
          ${f.fromRecordId?`<span style="font-size:11px;color:var(--txt3)">↗ Desde registro</span>`:''}
        </div>
      </div>
    </div>`;
  }).join('');
  return hdr+(pending.length?`<div style="background:var(--yelL);border:1px solid #E0C850;border-radius:var(--rs);padding:.8rem 1rem;margin-bottom:1rem;font-size:13px;display:flex;align-items:center;gap:8px">⏰ <b>${pending.length}</b> visión${pending.length!==1?'es':''} lista${pending.length!==1?'s':''} para revisar — ¿qué ocurrió realmente?</div>`:'')+`<div style="display:flex;flex-direction:column;gap:8px">${cards}</div>`;
}

function renderFuturoForm(prefill){
  const f=prefill||FF;
  const tomorrow=new Date();tomorrow.setDate(tomorrow.getDate()+7);
  const defaultDate=f.fechaRevision||tomorrow.toISOString().slice(0,10);
  return`<div class="form-wrap"><div class="form-hdr"><button class="back-btn" id="btn-fut-back">← Volver</button><div style="font-family:'Lora',serif;font-size:1rem">Nueva visión de futuro</div></div>
    <div class="form-body" style="display:flex;flex-direction:column;gap:1.4rem">
      <div>
        <div class="step-num">Contexto o situación</div>
        <div class="step-hint" style="margin-bottom:.7rem">¿Sobre qué situación futura quieres trabajar?</div>
        <textarea id="fut-contexto" rows="2" placeholder="Ej: La presentación del lunes, la conversación pendiente con mi jefe...">${f.contexto||''}</textarea>
      </div>
      <div style="background:var(--redL);border:1px solid #e8c0c0;border-radius:var(--rs);padding:1rem 1.2rem">
        <div class="step-num" style="color:var(--dng)">El peor escenario que imaginas</div>
        <div class="step-hint" style="margin-bottom:.7rem">Sácalo fuera para poder cuestionarlo.</div>
        <textarea id="fut-peor" rows="3" placeholder="Ej: Me quedo en blanco, todos se dan cuenta, me despiden...">${f.peor||''}</textarea>
        <div style="margin-top:.8rem"><label style="font-size:12px;color:var(--txt2);display:block;margin-bottom:5px">¿Cuánto crees que ocurrirá esto? <span id="fut-prob-peor-val" style="font-weight:500;color:var(--dng)">${f.probPeor||30}%</span></label>
        <input type="range" min="0" max="100" step="5" value="${f.probPeor||30}" id="fut-prob-peor" style="width:100%"></div>
      </div>
      <div style="background:var(--grnL);border:1px solid #a8d0c0;border-radius:var(--rs);padding:1rem 1.2rem">
        <div class="step-num" style="color:var(--grn)">El mejor escenario posible ✦</div>
        <div class="step-hint" style="margin-bottom:.7rem">Imagínalo con todo el detalle que puedas. Esto es el ejercicio central.</div>
        <textarea id="fut-mejor" rows="4" placeholder="Ej: Me expreso con claridad, recibo preguntas interesantes, salgo sintiéndome capaz...">${f.mejor||''}</textarea>
        <div style="margin-top:.8rem"><label style="font-size:12px;color:var(--txt2);display:block;margin-bottom:5px">¿Cuánto crees que ocurrirá esto? <span id="fut-prob-mejor-val" style="font-weight:500;color:var(--grn)">${f.probMejor||30}%</span></label>
        <input type="range" min="0" max="100" step="5" value="${f.probMejor||30}" id="fut-prob-mejor" style="width:100%"></div>
      </div>
      <div style="background:var(--sur2);border:1px solid var(--bdr);border-radius:var(--rs);padding:1rem 1.2rem">
        <div class="step-num">El escenario más realista</div>
        <div class="step-hint" style="margin-bottom:.7rem">¿Qué ocurrirá probablemente?</div>
        <textarea id="fut-realista" rows="3" placeholder="Ej: Habrá momentos buenos y algún tropiezo, pero lo completaré...">${f.realista||''}</textarea>
        <div style="margin-top:.8rem"><label style="font-size:12px;color:var(--txt2);display:block;margin-bottom:5px">¿Cuánto crees que ocurrirá esto? <span id="fut-prob-realista-val" style="font-weight:500;color:var(--wrm)">${f.probRealista||40}%</span></label>
        <input type="range" min="0" max="100" step="5" value="${f.probRealista||40}" id="fut-prob-realista" style="width:100%"></div>
      </div>
      <div>
        <div class="step-num">Fecha de revisión</div>
        <div class="step-hint" style="margin-bottom:.7rem">Cuándo volverás a este registro para ver qué ocurrió realmente.</div>
        <input type="date" id="fut-fecha" value="${defaultDate}" style="width:auto">
      </div>
    </div>
    <div class="form-footer"><div></div><button class="btn btn-primary btn-sm" id="btn-fut-save">Guardar visión ✓</button></div>
  </div>`;
}

function renderFuturoDetail(){
  const f=(S.futuras||[]).find(f=>f.id===S.futDetId);if(!f)return renderFuturoList();
  const isPending=f.fechaRevision&&new Date(f.fechaRevision)<=new Date()&&!f.realidad;
  const isReviewed=!!f.realidad;
  const outcomeColors={mejor:'var(--grn)',realista:'var(--wrm)',peor:'var(--dng)'};
  const outcomeLabels={mejor:'✓ Ocurrió el mejor escenario',realista:'— Ocurrió algo intermedio',peor:'✗ Ocurrió el peor escenario'};
  const reviewPanel=isReviewed
    ?`<div style="background:var(--grnL);border:1px solid #a8d0c0;border-radius:var(--rs);padding:1rem 1.2rem;margin-top:.5rem">
        <div class="f-lbl" style="color:var(--grn)">¿Qué ocurrió realmente?</div>
        <div style="font-size:13px;font-weight:500;color:${outcomeColors[f.outcomeType]||'var(--txt2)'};margin-bottom:.5rem">${outcomeLabels[f.outcomeType]||''}</div>
        <div style="font-size:14px;line-height:1.65">${f.realidad}</div>
      </div>`
    :isPending
    ?`<div style="background:var(--yelL);border:1px solid #E0C850;border-radius:var(--rs);padding:1rem 1.2rem;margin-top:.5rem">
        <div class="f-lbl" style="color:var(--yel)">¿Qué ocurrió realmente?</div>
        <p style="font-size:13px;color:var(--txt2);margin-bottom:.8rem">Ha llegado el momento de revisar esta visión.</p>
        <div style="display:flex;gap:7px;margin-bottom:.8rem">
          <button class="useful-btn ${f.outcomeType==='mejor'?'sel-yes':''}" data-outcome="mejor">✓ El mejor</button>
          <button class="useful-btn ${f.outcomeType==='realista'?'':''}" data-outcome="realista" style="${f.outcomeType==='realista'?'background:var(--yelL);color:var(--yel);border-color:var(--yel);font-weight:500':''}">— Intermedio</button>
          <button class="useful-btn ${f.outcomeType==='peor'?'sel-no':''}" data-outcome="peor">✗ El peor</button>
        </div>
        <textarea id="fut-realidad-ta" rows="3" placeholder="Describe qué ocurrió realmente...">${f.realidad||''}</textarea>
        <div style="display:flex;justify-content:flex-end;margin-top:7px"><button class="btn btn-primary btn-sm" id="btn-fut-save-review">Guardar revisión</button></div>
      </div>`
    :`<div style="font-size:13px;color:var(--txt3);margin-top:.5rem">Fecha de revisión: ${f.fechaRevision||'No establecida'}</div>`;
  return`<div class="detail-wrap"><div class="detail-hdr" style="display:flex;align-items:flex-start;justify-content:space-between">
    <div><button class="back-btn" id="btn-fut-back">← Volver</button><div style="font-size:12px;color:var(--txt3)">Creada el ${fmtDate(f.id)}${f.fromRecordId?' · ↗ Desde registro':''}</div></div>
    <button class="btn btn-danger btn-sm" id="btn-fut-del">Eliminar</button>
  </div>
  <div class="detail-body">
    ${f.contexto?`<div><div class="f-lbl">Situación</div><div class="f-val">${f.contexto}</div></div>`:''}
    <div style="background:var(--redL);border:1px solid #e8c0c0;border-radius:var(--rs);padding:1rem 1.2rem">
      <div class="f-lbl" style="color:var(--dng)">Peor escenario imaginado</div>
      <div style="font-size:14px;line-height:1.65;margin-bottom:.6rem">${f.peor||'—'}</div>
      <div style="font-size:12px;color:var(--dng)">Probabilidad percibida: <b>${f.probPeor||'?'}%</b></div>
    </div>
    <div style="background:var(--grnL);border:1px solid #a8d0c0;border-radius:var(--rs);padding:1rem 1.2rem">
      <div class="f-lbl" style="color:var(--grn)">Mejor escenario posible ✦</div>
      <div style="font-size:14px;line-height:1.65;font-style:italic;margin-bottom:.6rem">"${f.mejor||'—'}"</div>
      <div style="font-size:12px;color:var(--grn)">Probabilidad percibida: <b>${f.probMejor||'?'}%</b></div>
    </div>
    <div style="background:var(--sur2);border:1px solid var(--bdr);border-radius:var(--rs);padding:1rem 1.2rem">
      <div class="f-lbl">Escenario realista</div>
      <div style="font-size:14px;line-height:1.65;margin-bottom:.6rem">${f.realista||'—'}</div>
      <div style="font-size:12px;color:var(--txt3)">Probabilidad percibida: <b>${f.probRealista||'?'}%</b></div>
    </div>
    ${reviewPanel}
  </div></div>`;
}

function renderFuturoAnalisis(){
  const items=S.futuras||[];
  const reviewed=items.filter(f=>f.realidad&&f.outcomeType);
  const mejorCnt=reviewed.filter(f=>f.outcomeType==='mejor').length;
  const realistaCnt=reviewed.filter(f=>f.outcomeType==='realista').length;
  const peorCnt=reviewed.filter(f=>f.outcomeType==='peor').length;
  const pending=items.filter(f=>f.fechaRevision&&new Date(f.fechaRevision)<=new Date()&&!f.realidad).length;
  const avgProbPeor=items.length?Math.round(items.reduce((s,f)=>s+(f.probPeor||30),0)/items.length):0;
  const avgProbMejor=items.length?Math.round(items.reduce((s,f)=>s+(f.probMejor||30),0)/items.length):0;
  const peorRate=reviewed.length?Math.round(peorCnt/reviewed.length*100):0;
  const peorBarW=reviewed.length?Math.round(mejorCnt/reviewed.length*100):0;
  const realistaBarW=reviewed.length?Math.round(realistaCnt/reviewed.length*100):0;
  const peorBarW2=reviewed.length?Math.round(peorCnt/reviewed.length*100):0;
  return`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.3rem;flex-wrap:wrap;gap:9px">
    <div style="font-family:'Lora',serif;font-size:1.25rem">Análisis — Mirando al futuro</div>
    <button class="btn btn-ghost btn-sm" id="btn-fut-back">← Volver</button>
  </div>
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:9px;margin-bottom:1.2rem">
    <div class="metric-card"><div class="m-lbl">VISIONES</div><div class="m-val">${items.length}</div></div>
    <div class="metric-card"><div class="m-lbl">REVISADAS</div><div class="m-val">${reviewed.length}</div></div>
    <div class="metric-card"><div class="m-lbl">POR REVISAR</div><div class="m-val" style="color:var(--yel)">${pending}</div></div>
    <div class="metric-card"><div class="m-lbl">PEOR CUMPLIDO</div><div class="m-val" style="color:var(--dng)">${peorRate}%</div><div class="m-sub">${reviewed.length?`de ${reviewed.length} revisadas`:''}</div></div>
  </div>
  ${reviewed.length?`<div class="dash-section" style="margin-bottom:.9rem">
    <div class="dash-stitle">¿Qué ocurrió realmente?</div>
    <div class="bar-chart">
      <div class="bar-row"><div class="bar-name" style="color:var(--grn)">✓ El mejor</div><div class="bar-track"><div class="bar-fill" style="width:${peorBarW}%;background:var(--grn)"></div></div><div class="bar-cnt">${mejorCnt}</div></div>
      <div class="bar-row"><div class="bar-name" style="color:var(--wrm)">— Intermedio</div><div class="bar-track"><div class="bar-fill" style="width:${realistaBarW}%;background:var(--wrm)"></div></div><div class="bar-cnt">${realistaCnt}</div></div>
      <div class="bar-row"><div class="bar-name" style="color:var(--dng)">✗ El peor</div><div class="bar-track"><div class="bar-fill" style="width:${peorBarW2}%;background:var(--dng)"></div></div><div class="bar-cnt">${peorCnt}</div></div>
    </div>
    <div style="font-size:12px;color:var(--txt3);margin-top:.8rem;padding-top:.8rem;border-top:1px dashed var(--bdr)">Tu peor escenario se cumplió en el <b style="color:${peorRate<30?'var(--grn)':'var(--dng)'}">${peorRate}%</b> de los casos revisados. Tu tendencia catastrófica tiene datos reales ahora.</div>
  </div>`:''}
  <div class="dash-section">
    <div class="dash-stitle">Probabilidad percibida media</div>
    <div class="bar-chart">
      <div class="bar-row"><div class="bar-name">Peor escenario</div><div class="bar-track"><div class="bar-fill" style="width:${avgProbPeor}%;background:var(--dng)"></div></div><div class="bar-cnt">${avgProbPeor}%</div></div>
      <div class="bar-row"><div class="bar-name">Mejor escenario</div><div class="bar-track"><div class="bar-fill" style="width:${avgProbMejor}%;background:var(--grn)"></div></div><div class="bar-cnt">${avgProbMejor}%</div></div>
    </div>
  </div>`;
}

// ── FUTURO INTERACTIONS
function setupFuturoInteractions(){
  document.getElementById('btn-fut-new')?.addEventListener('click',()=>{resetFF();S.view='futuro-new';render()});
  document.getElementById('btn-fut-back')?.addEventListener('click',()=>{S.view='futuro';render()});
  document.getElementById('btn-fut-back-home')?.addEventListener('click',()=>{S.view='home';render()});
  document.getElementById('btn-fut-analisis')?.addEventListener('click',()=>{S.view='futuro-analisis';render()});
  document.querySelectorAll('[data-fut]').forEach(c=>c.addEventListener('click',()=>{S.futDetId=parseInt(c.dataset.fut);S.view='futuro-detail';render()}));
  // Sliders live update
  ['peor','mejor','realista'].forEach(k=>{
    document.getElementById(`fut-prob-${k}`)?.addEventListener('input',e=>{
      const el=document.getElementById(`fut-prob-${k}-val`);if(el)el.textContent=e.target.value+'%';
    });
  });
  // Save new vision
  document.getElementById('btn-fut-save')?.addEventListener('click',()=>{
    const entry={
      id:Date.now(),
      contexto:document.getElementById('fut-contexto')?.value?.trim()||'',
      peor:document.getElementById('fut-peor')?.value?.trim()||'',
      mejor:document.getElementById('fut-mejor')?.value?.trim()||'',
      realista:document.getElementById('fut-realista')?.value?.trim()||'',
      probPeor:parseInt(document.getElementById('fut-prob-peor')?.value||30),
      probMejor:parseInt(document.getElementById('fut-prob-mejor')?.value||30),
      probRealista:parseInt(document.getElementById('fut-prob-realista')?.value||40),
      fechaRevision:document.getElementById('fut-fecha')?.value||'',
      fromRecordId:FF.fromRecordId||null,
      realidad:null,outcomeType:null,
    };
    if(!entry.mejor&&!entry.peor){alert('Escribe al menos el mejor o el peor escenario.');return;}
    if(!S.futuras)S.futuras=[];
    S.futuras.push(entry);saveData();S.futDetId=entry.id;S.view='futuro-detail';resetFF();render();
  });
  // Delete
  document.getElementById('btn-fut-del')?.addEventListener('click',()=>{
    if(confirm('¿Eliminar esta visión?')){S.futuras=S.futuras.filter(f=>f.id!==S.futDetId);saveData();S.view='futuro';render();}
  });
  // Review outcome selection
  let selectedOutcome=null;
  document.querySelectorAll('[data-outcome]').forEach(b=>b.addEventListener('click',()=>{
    selectedOutcome=b.dataset.outcome;
    const f=(S.futuras||[]).find(f=>f.id===S.futDetId);if(f){f.outcomeType=selectedOutcome;render();}
  }));
  // Save review
  document.getElementById('btn-fut-save-review')?.addEventListener('click',()=>{
    const f=(S.futuras||[]).find(f=>f.id===S.futDetId);if(!f)return;
    const ta=document.getElementById('fut-realidad-ta');
    if(!f.outcomeType){alert('Selecciona qué ocurrió (mejor, intermedio o peor).');return;}
    f.realidad=ta?.value?.trim()||'Revisado';
    saveData();render();
  });
  // Send record to futuro
  document.getElementById('btn-to-futuro')?.addEventListener('click',()=>{
    const rec=S.records.find(r=>r.id===S.detailId);if(!rec)return;
    resetFF();
    FF.fromRecordId=rec.id;
    FF.contexto=rec.titulo||rec.situacion||'';
    const thoughts=rec.thoughts||[];
    FF.peor=thoughts.map(t=>t.text).filter(Boolean).join(' / ');
    S.view='futuro-new';render();
  });
}

loadData();
</script>
</body>
</html>
